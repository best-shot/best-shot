packages:
  - packages/*
  - tools/*
  - tests

catalog:
  '@babel/core': ^7.29.0
  browserslist: ^4.28.2
  chalk: ^5.6.2
  cheetor: ^0.13.0
  core-js: ^3.49.0
  core-js-pure: ^3.49.0
  deepmerge-ts: ^7.1.5
  ext-to-regexp: ^0.1.0
  flat: ^6.0.1
  fs-extra: ^11.3.4
  ini: ^6.0.0
  settingz: ^0.2.0
  slash-to-regexp: ^0.2.0
  sort-keys: ^6.0.0
  vue: ^3.5.32
  webpack: ^5.105.4
  yaml: ^2.8.3

catalogs:
  react:
    '@pmmmwh/react-refresh-webpack-plugin': ^0.6.2
    '@types/react': ^18.3.28
    '@types/react-dom': ^18.3.7
    react: ^18.3.1
    react-dom: ^18.3.1
    react-refresh: ^0.18.0

configDependencies:
  pnpm-plugin-nice-move: 0.3.0+sha512-RsmTZcxGja000NksrFr7g6n+bcAF0NQQSDaNcV+yaRlyB7EjLet7vPDCqpdg9js72B2rU0fF3kaL0nIuvRC1Rg==

minimumReleaseAgeExclude:
  - '@into-mini/*'
  - '@vue/*'
  - vue
  - postcss-preset-evergreen
  - garou

overrides:
  '@into-mini/sfc-template-traverse': 0.1.2
  '@into-mini/sfc-transformer': 0.6.9
  '@into-mini/vue-mini-patch': 0.4.8
  eslint: ^9.39.3
  qs@<6.14.1: '>=6.15.0'
  sass: '-'

patchedDependencies:
  '@vue-mini/core': .patches/@vue-mini__core.patch
  ava: .patches/ava.patch

shamefullyHoist: true

trustPolicyExclude:
  - semver
  - memfs@4.56.2

updateConfig:
  ignoreDependencies:
    - express
    - react
    - react-dom
